- name: Copying systemd file.
  ansible.builtin.copy:
    src: "{{component}}.service"
    dest: /etc/systemd/system/{{component}}.service

- name: Reload the {{ component }} service.
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: restarted
    enabled: yes
    daemon_reload: true
    loop:
      - "{{ component }}"
      - amazon-ssm-agent



