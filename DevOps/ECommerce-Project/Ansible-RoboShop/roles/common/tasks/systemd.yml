- name: Copying systemd file.
  ansible.builtin.copy:
    src: "{{component}}.service"
    dest: /etc/systemd/system/{{component}}.service

- name: Reload the {{component}} service.
  ansible.builtin.systemd:
    name:
    - "{{component}}"
    - amazon-ssm-agent
    state: restarted
    enabled: yes
    daemon-reload: yes

