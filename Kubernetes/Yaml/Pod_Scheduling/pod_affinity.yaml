# In one node only one redis and one nginx pod should present.
# Web
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: web
  name: nginx-web
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - image: nginx:1.14
          imagePullPolicy: IfNotPresent
          name: nginx
          ports:
            - containerPort: 80
      terminationGracePeriodSeconds: 120
---

# Redis
# Web
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: redis
  name: nginx-redis
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: redis
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - image: docker.io/redis:7.2
          imagePullPolicy: IfNotPresent
          name: redis
          ports:
            - containerPort: 6379
      terminationGracePeriodSeconds: 120