apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: web
  name: web
  namespace:  singtel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      volumes:
        - name: logs
          persistentVolumeClaim:
            claimName: web-pvc
      containers:
        - image: nginx
          name: nginx
          volumeMounts:
            - name: logs
              mountPath: /usr/share/nginx/html
